<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Dealership Dashboard</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background: radial-gradient(circle at top left, #f6f6e9, #d9e8e2 50%, #c9d8e9);
            display: grid;
            place-items: center;
        }

        .card {
            width: min(720px, 92vw);
            background: #ffffffdd;
            border: 1px solid #0f2f2f33;
            border-radius: 18px;
            box-shadow: 0 15px 40px #0f2f2f22;
            padding: 28px;
        }

        h1 {
            margin: 0;
            color: #12353a;
            font-size: 2rem;
        }

        p {
            color: #1f3f44;
            line-height: 1.5;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        a {
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 10px;
            background: #12353a;
            color: white;
            font-weight: 600;
        }

        a.secondary {
            background: #356a6a;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Car Dealership Sales Dashboard</h1>
        <div class="links">
            <a href="{% url 'sales_list' %}">Manage Sales</a>
            <a href="{% url 'sales_create' %}" class="secondary">Add New Sale</a>
            <a href="{% url 'sales_report' %}" class="secondary">Sales Report</a>
            <a href="/admin/">Admin</a>
        </div>
    </main>
</body>
</html>
