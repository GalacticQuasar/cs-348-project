<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Dealership Dashboard</title>
    <style>
        :root {
            --bg-deep: #1a0808;
            --bg-card: #2d1515;
            --maroon: #4a1f1f;
            --maroon-light: #6b2c2c;
            --leather: #8b5a3c;
            --leather-light: #a67052;
            --cream: #e8d4c4;
            --cream-muted: #c4a88a;
            --gold: #c9a456;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
            background: var(--bg-deep);
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(74, 31, 31, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(139, 90, 60, 0.2) 0%, transparent 50%);
            display: grid;
            place-items: center;
        }

        .card {
            width: min(720px, 92vw);
            background: var(--bg-card);
            border: 1px solid var(--maroon);
            border-radius: 4px;
            box-shadow: 
                0 2px 8px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.03);
            padding: 48px 40px;
        }

        h1 {
            margin: 0 0 8px 0;
            color: var(--cream);
            font-size: 1.75rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .subtitle {
            color: var(--cream-muted);
            font-size: 0.875rem;
            margin-bottom: 32px;
            font-style: italic;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, var(--maroon-light), transparent);
            margin-bottom: 32px;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        a {
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 2px;
            background: var(--maroon);
            color: var(--cream);
            font-size: 0.9rem;
            letter-spacing: 0.03em;
            border: 1px solid var(--maroon-light);
            transition: background 0.2s, border-color 0.2s;
        }

        a:hover {
            background: var(--maroon-light);
            border-color: var(--leather);
        }

        a.secondary {
            background: transparent;
            border-color: var(--leather);
            color: var(--leather-light);
        }

        a.secondary:hover {
            background: rgba(139, 90, 60, 0.15);
            color: var(--cream);
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Car Dealership</h1>
        <p class="subtitle">Sales Management Dashboard</p>
        <div class="divider"></div>
        <div class="links">
            <a href="{% url 'sales_list' %}">Manage Sales</a>
            <a href="{% url 'sales_create' %}" class="secondary">Add New Sale</a>
            <a href="{% url 'sales_report' %}" class="secondary">Sales Report</a>
            <a href="/admin/" class="secondary">Admin</a>
        </div>
    </main>
</body>
</html>
